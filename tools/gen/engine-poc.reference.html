<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Procedural Flat-Six POC</title>
<style>
  html,body{margin:0;height:100%;background:#e9eaec;overflow:hidden;font-family:ui-monospace,Menlo,monospace}
  #c{display:block;width:100vw;height:100vh}
  #tag{position:fixed;left:16px;top:14px;font-size:12px;letter-spacing:.12em;color:#444}
  #tag b{color:#c81e1e}
</style>
</head>
<body>
<div id="tag"><b>FLAT·SIX</b> — PROCEDURAL ENGINE POC · clean technical / CAD-illustration style</div>
<canvas id="c"></canvas>
<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, preserveDrawingBuffer:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;

const scene = new THREE.Scene();
scene.background = new THREE.Color('#e9eaec');
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

const camera = new THREE.PerspectiveCamera(38, innerWidth/innerHeight, 0.1, 100);
camera.position.set(7.5, 4.6, 8.2);
const controls = new OrbitControls(camera, canvas);
controls.target.set(0,0.3,0);
controls.update();

// lighting
const key = new THREE.DirectionalLight(0xffffff, 2.2);
key.position.set(6,10,6); key.castShadow=true;
key.shadow.mapSize.set(2048,2048);
key.shadow.camera.near=1; key.shadow.camera.far=40;
key.shadow.camera.left=-10;key.shadow.camera.right=10;key.shadow.camera.top=10;key.shadow.camera.bottom=-10;
key.shadow.bias=-0.0002;
scene.add(key);
scene.add(new THREE.HemisphereLight(0xffffff, 0x8d8f94, 0.6));
const rim = new THREE.DirectionalLight(0xbfd4ff, 0.8); rim.position.set(-8,4,-6); scene.add(rim);

// ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(60,60),
  new THREE.ShadowMaterial({opacity:0.22})
);
ground.rotation.x=-Math.PI/2; ground.position.y=-2.05; ground.receiveShadow=true;
scene.add(ground);

// ---- materials (per-system color coding, the app would key off these) ----
const matBlock   = new THREE.MeshStandardMaterial({color:0xb9bdc4, metalness:0.95, roughness:0.34});
const matCover   = new THREE.MeshStandardMaterial({color:0x2a2d33, metalness:0.6,  roughness:0.45});
const matIntake  = new THREE.MeshStandardMaterial({color:0x6f7681, metalness:0.9,  roughness:0.4});
const matRunner  = new THREE.MeshStandardMaterial({color:0x9aa1ab, metalness:0.95, roughness:0.3});
const matSteel   = new THREE.MeshStandardMaterial({color:0xd7dade, metalness:1.0,  roughness:0.22});
const matExhaust = new THREE.MeshStandardMaterial({color:0xc9b79f, metalness:1.0,  roughness:0.5});
const matRed     = new THREE.MeshStandardMaterial({color:0xc81e1e, metalness:0.4,  roughness:0.4});
const matFin     = new THREE.MeshStandardMaterial({color:0xcfd3d9, metalness:0.95, roughness:0.28});

const engine = new THREE.Group();
scene.add(engine);
function add(mesh, parent=engine){ mesh.castShadow=true; mesh.receiveShadow=true; parent.add(mesh); return mesh; }

// ---- crankcase (central) ----
add(new THREE.Mesh(new RoundedBoxGeometry(3.0, 1.7, 2.2, 4, 0.18), matBlock));
// sump / oil pan
const pan = add(new THREE.Mesh(new RoundedBoxGeometry(2.4,0.7,1.7,4,0.12), matBlock));
pan.position.y=-1.05;

// ---- water-cooled boxer bank: smooth head + cam cover + coil packs, mirrored L/R ----
// (981 MA1: NO exposed fins, NO cooling fan — corrected from reference analysis)
function makeBank(dir){ // dir = +1 right, -1 left
  const bank = new THREE.Group();
  // cylinder bank body (smooth casting, slopes outward) — replaces finned barrels
  const body = new THREE.Mesh(new RoundedBoxGeometry(1.15,1.0,2.05,4,0.14), matBlock);
  body.position.set(dir*1.05, 0.0, 0);
  add(body,bank);
  // cam cover running the length of the bank (low, smooth — water-cooled)
  const cover = new THREE.Mesh(new RoundedBoxGeometry(0.9,0.5,2.05,4,0.16), matCover);
  cover.position.set(dir*1.62, 0.18, 0);
  add(cover,bank);
  // raised ribs along cam cover
  for(let r=0;r<2;r++){
    const rib = new THREE.Mesh(new RoundedBoxGeometry(0.78,0.07,2.0,2,0.03), matCover);
    rib.position.set(dir*1.62, 0.40-r*0.16, 0);
    add(rib,bank);
  }
  // 3 ignition coil packs sitting on the cam cover
  for(let i=0;i<3;i++){
    const z=(i-1)*0.62;
    const coil = new THREE.Mesh(new RoundedBoxGeometry(0.26,0.34,0.3,3,0.06), matCover);
    coil.position.set(dir*1.62, 0.55, z);
    add(coil,bank);
    const cap = new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,0.18,12), matSteel);
    cap.position.set(dir*1.45, 0.5, z); cap.rotation.z=Math.PI/2;
    add(cap,bank);
  }
  engine.add(bank);
}
makeBank(1); makeBank(-1);

// ---- wide flat intake plenum spanning both banks (dominant top feature) ----
const plenum = add(new THREE.Mesh(new RoundedBoxGeometry(2.5,0.62,2.15,5,0.26), matIntake));
plenum.position.y=1.18;
// resonance flap housing ridge
const ridge = add(new THREE.Mesh(new RoundedBoxGeometry(2.5,0.14,0.5,3,0.06), matIntake));
ridge.position.set(0,1.5,0);
// curved intake runners feeding each head
function runner(side, z){
  const curve = new THREE.CatmullRomCurve3([
    new THREE.Vector3(side*1.1, 1.3, z),
    new THREE.Vector3(side*1.45, 1.05, z),
    new THREE.Vector3(side*1.6, 0.7, z),
    new THREE.Vector3(side*1.62, 0.45, z),
  ]);
  add(new THREE.Mesh(new THREE.TubeGeometry(curve,20,0.11,14,false), matRunner));
}
for(let i=0;i<3;i++){ const z=(i-1)*0.62; runner(1,z); runner(-1,z); }
// throttle body at rear of plenum
const tb = add(new THREE.Mesh(new THREE.CylinderGeometry(0.26,0.3,0.55,24), matSteel));
tb.position.set(0,1.18,1.35); tb.rotation.x=Math.PI/2;
// oil filler cap on top
const filler = add(new THREE.Mesh(new THREE.CylinderGeometry(0.16,0.16,0.16,20), matSteel));
filler.position.set(0.55,1.55,-0.6);

// ---- crank pulley + belt (front) ----
const pulley = add(new THREE.Mesh(new THREE.CylinderGeometry(0.55,0.55,0.28,36), matSteel));
pulley.rotation.x=Math.PI/2; pulley.position.set(0,-0.2,1.35);
const pulley2 = add(new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.3,0.22,28), matSteel));
pulley2.rotation.x=Math.PI/2; pulley2.position.set(0.8,0.5,1.4);
const belt = add(new THREE.Mesh(new THREE.TorusGeometry(0.58,0.06,12,40), matCover));
belt.position.set(0,-0.2,1.5);

// ---- oil filter ----
const oil = add(new THREE.Mesh(new THREE.CylinderGeometry(0.26,0.26,0.7,24), matRed));
oil.position.set(-0.85,-0.55,1.3);

// ---- exhaust headers (underneath) ----
function header(side,z){
  const curve = new THREE.CatmullRomCurve3([
    new THREE.Vector3(side*1.55,-0.1,z),
    new THREE.Vector3(side*1.7,-0.7,z*0.6),
    new THREE.Vector3(side*1.2,-1.1,-0.2),
    new THREE.Vector3(side*0.7,-1.3,-1.0),
  ]);
  add(new THREE.Mesh(new THREE.TubeGeometry(curve,24,0.1,14,false), matExhaust));
}
for(let i=0;i<3;i++){ const z=(i-1)*0.62; header(1,z); header(-1,z); }
const collector = add(new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.22,1.0,20), matExhaust));
collector.rotation.x=Math.PI/2.4; collector.position.set(0,-1.4,-1.4);

// center the rig a touch
engine.position.y=0.25;

function resize(){ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); }
addEventListener('resize',resize);
function loop(){ controls.update(); renderer.render(scene,camera); requestAnimationFrame(loop); }
loop();
window.__ready=true;
window.__camera=camera; window.__controls=controls;
</script>
</body>
</html>
